name: Bridge tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/thingy_bridge/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked
      - name: Lint
        run: uv run --locked ruff check apps/thingy_bridge
      - name: Format
        run: uv run --locked ruff format --check apps/thingy_bridge
      - name: Audit locked dependencies
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uvx --from pip-audit==2.10.1 pip-audit --requirement /tmp/requirements.txt --disable-pip
      - name: Tests
        run: uv run --locked pytest apps/thingy_bridge/tests/ -q

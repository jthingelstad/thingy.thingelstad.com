name: Build and Deploy (web)

# Standalone Thingy site (web/) → GitHub Pages.
# The Discord bridge (apps/thingy_bridge) is a separate process and is NOT
# built or deployed here.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: 'web/.node-version'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npx playwright install --with-deps chromium webkit

      - run: npm run format:check

      - run: npm run lint

      - run: npm run lint:css

      - run: npm run typecheck

      - run: npm run knip

      - run: npm run test:coverage

      - run: npm run build
        env:
          LIBRARIAN_API_URL: ${{ vars.LIBRARIAN_API_URL }}
          LIBRARIAN_STREAM_URL: ${{ vars.LIBRARIAN_STREAM_URL }}
          TINYLYTICS_SITE_UID: ${{ vars.TINYLYTICS_SITE_UID }}

      - name: Browser smoke
        env:
          LIBRARIAN_API_URL: ${{ vars.LIBRARIAN_API_URL }}
          LIBRARIAN_STREAM_URL: ${{ vars.LIBRARIAN_STREAM_URL }}
          TINYLYTICS_SITE_UID: ${{ vars.TINYLYTICS_SITE_UID }}
        run: |
          npx vite preview --host 0.0.0.0 --port=8080 > /tmp/thingy-vite-preview.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..30}; do
            if curl -fsS http://localhost:8080/chat/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/chat/ > /dev/null
          THINGY_SMOKE_URL=http://localhost:8080 npm run smoke

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

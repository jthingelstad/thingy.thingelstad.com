version: 2
# Dependabot updates are PR-only. Dependency updates are handled directly on
# main by the weekly maintenance process; vulnerability alerts remain enabled.
updates:
  - package-ecosystem: npm
    directory: "/web"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
  - package-ecosystem: uv
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: weekly

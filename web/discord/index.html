<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connect Discord · Thingy</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Connect a Weekly Thing Supporting Membership to the Thingy Discord.">
  <link rel="canonical" href="https://thingy.thingelstad.com/discord/">
  <link rel="icon" href="/img/thingy.png">
  <script>window.ThingyConfig = __THINGY_DISCORD_CONFIG__;</script>
</head>
<body>
  <main class="thingy-auth-page thingy-discord-page">
    <section class="thingy-auth-card thingy-discord-card" aria-labelledby="thingy-discord-title">
      <a class="thingy-auth-mark" href="/" aria-label="Thingy home">
        <img src="/img/thingy.png" alt="" width="1022" height="1022">
      </a>
      <p class="thingy-auth-kicker">Thingy Discord</p>
      <h1 id="thingy-discord-title">Connect Discord</h1>
      <p id="thingy-discord-copy">Thingy is checking your account.</p>
      <div class="thingy-discord-signin" id="thingy-discord-signin" hidden>
        <a id="thingy-discord-signin-link" href="/signin/">Sign In to Continue</a>
      </div>
      <div class="thingy-discord-code" id="thingy-discord-code" hidden>
        <span>Verification code</span>
        <strong id="thingy-discord-code-value"></strong>
      </div>
      <div class="thingy-discord-command" id="thingy-discord-command" hidden>
        <span>Discord command</span>
        <code id="thingy-discord-command-value"></code>
        <button type="button" id="thingy-discord-copy-command">Copy Command</button>
      </div>
      <p class="thingy-signin-message" id="thingy-discord-message" aria-live="polite"></p>
      <p class="thingy-discord-actions">
        <a href="/chat/">Back to Chat</a>
      </p>
    </section>
  </main>
  <script type="module" src="/src/pages/discord.js"></script>
</body>
</html>
